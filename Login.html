<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>લોગિન - Ma Umiya Enterprise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

<div class="login-container">
    <div class="login-card">
        <div class="logo-section">
            <div class="logo-icon">
                <i class="fas fa-truck-fast"></i>
            </div>
            <h3>Ma Umiya Enterprise</h3>
            <p class="subtitle">બિલિંગ સોફ્ટવેરમાં આપનું સ્વાગત છે</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email" class="form-label"><i class="fas fa-envelope"></i> ઈમેઈલ આઈડી</label>
                <input type="email" class="form-control" id="email" placeholder="admin@example.com" required>
            </div>
            <div class="form-group">
                <label for="password" class="form-label"><i class="fas fa-lock"></i> પાસવર્ડ</label>
                <div class="position-relative">
                    <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                    <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
                <i class="fas fa-arrow-right-to-bracket"></i> લોગિન કરો
            </button>
        </form>
        
        <div id="errorMessage" class="alert-custom d-none" role="alert">
            <i class="fas fa-circle-exclamation"></i>
            <span></span>
        </div>
    </div>
</div>

<script type="module" src="auth.js"></script>

<script>
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    
    if(togglePassword) {
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    }
    
    window.addEventListener('error', function(e) {
        const errDiv = document.getElementById("errorMessage");
        if(errDiv) {
            errDiv.classList.remove("d-none");
            errDiv.querySelector('span').textContent = "Error: " + e.message;
        }
    });
</script>
</body>
</html>
