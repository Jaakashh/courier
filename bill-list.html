<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>બધા બિલ - Ma Umiya Enterprise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Mobile toggle -->
<button class="mobile-toggle" id="mobileToggle" aria-label="Toggle sidebar">
    <i class="fas fa-bars"></i>
</button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <div class="sidebar-brand-icon">
            <i class="fas fa-truck-fast"></i>
        </div>
        <div>
            <div class="sidebar-brand-text">Ma Umiya</div>
            <div class="sidebar-brand-sub">Enterprise</div>
        </div>
    </div>
    <nav class="sidebar-nav">
        <a href="dashboard.html"><i class="fa-solid fa-gauge-high"></i> ડેશબોર્ડ</a>
        <a href="party-master.html"><i class="fa-solid fa-users"></i> પાર્ટી માસ્ટર</a>
        <a href="company-master.html"><i class="fa-solid fa-building"></i> કંપની પ્રોફાઇલ</a>
        <a href="bill-create.html"><i class="fa-solid fa-file-invoice-dollar"></i> નવું બિલ</a>
        <a href="bill-list.html" class="active"><i class="fa-solid fa-list"></i> બધા બિલ</a>
    </nav>
</div>

<div class="main-content page-enter">
    <div class="header-section">
        <h3><i class="fa-solid fa-list"></i>બધા બિલની યાદી</h3>
        <a href="bill-create.html" class="btn btn-primary"><i class="fas fa-plus"></i> નવું બિલ બનાવો</a>
    </div>

    <div class="search-box">
        <i class="fas fa-search search-icon"></i>
        <input type="text" class="form-control" id="searchInvoice" placeholder="બિલ નંબર અથવા પાર્ટીનું નામ શોધો...">
    </div>

    <div class="data-card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>બિલ નં.</th>
                            <th>તારીખ</th>
                            <th>પાર્ટીનું નામ</th>
                            <th class="text-end">કુલ રકમ</th>
                            <th>સ્ટેટ્સ</th>
                            <th class="text-center">એક્શન</th>
                        </tr>
                    </thead>
                    <tbody id="billsTableBody">
                        <tr>
                            <td colspan="6" class="text-center text-muted py-4">
                                <i class="fas fa-spinner fa-spin me-2"></i>બિલ લોડ થઈ રહ્યા છે...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="bill-list.js"></script>
<script>
    const mobileToggle = document.getElementById('mobileToggle');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    
    if (mobileToggle) {
        mobileToggle.addEventListener('click', function() {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        });
        overlay.addEventListener('click', function() {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        });
    }
</script>
</body>
</html>
