<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>કંપની પ્રોફાઇલ - Ma Umiya Enterprise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Mobile toggle -->
<button class="mobile-toggle" id="mobileToggle" aria-label="Toggle sidebar">
    <i class="fas fa-bars"></i>
</button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <div class="sidebar-brand-icon">
            <i class="fas fa-truck-fast"></i>
        </div>
        <div>
            <div class="sidebar-brand-text">Ma Umiya</div>
            <div class="sidebar-brand-sub">Enterprise</div>
        </div>
    </div>
    <nav class="sidebar-nav">
        <a href="dashboard.html"><i class="fa-solid fa-gauge-high"></i> ડેશબોર્ડ</a>
        <a href="party-master.html"><i class="fa-solid fa-users"></i> પાર્ટી માસ્ટર</a>
        <a href="company-master.html" class="active"><i class="fa-solid fa-building"></i> કંપની પ્રોફાઇલ</a>
        <a href="bill-create.html"><i class="fa-solid fa-file-invoice-dollar"></i> નવું બિલ</a>
        <a href="bill-list.html"><i class="fa-solid fa-list"></i> બધા બિલ</a>
    </nav>
</div>

<div class="main-content page-enter">
    <div class="header-section">
        <h3><i class="fa-solid fa-building"></i>કંપની માસ્ટર સેટઅપ</h3>
    </div>

    <div class="main-card">
        <div id="alertMessage" class="alert-custom d-none" role="alert"></div>

        <form id="companyForm">
            <h5 class="section-title"><i class="fas fa-info-circle"></i>સામાન્ય વિગતો</h5>
            
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <div class="form-group mb-0">
                        <label class="form-label"><i class="fas fa-building"></i> કંપનીનું નામ</label>
                        <input type="text" class="form-control" id="compName" placeholder="દા.ત. Ma Umiya Enterprise" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group mb-0">
                        <label class="form-label"><i class="fas fa-phone"></i> મોબાઈલ નંબર</label>
                        <input type="text" class="form-control" id="compMobile" placeholder="દા.ત. 9876543210" required>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label"><i class="fas fa-map-marker-alt"></i> સરનામું</label>
                <textarea class="form-control" id="compAddress" rows="3" placeholder="કંપનીનું સંપૂર્ણ સરનામું..." required></textarea>
            </div>

            <h5 class="section-title"><i class="fas fa-receipt"></i>ટેક્સ અને રજીસ્ટ્રેશન વિગતો</h5>
            
            <div class="row g-3 mb-3">
                <div class="col-md-4">
                    <div class="form-group mb-0">
                        <label class="form-label"><i class="fas fa-hashtag"></i> GSTIN</label>
                        <input type="text" class="form-control" id="compGSTIN" placeholder="24AAAAA0000A1Z5">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-group mb-0">
                        <label class="form-label"><i class="fas fa-id-card"></i> PAN નંબર</label>
                        <input type="text" class="form-control" id="compPAN" placeholder="ABCDE1234F">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-group mb-0">
                        <label class="form-label"><i class="fas fa-code"></i> HSN/SAC કોડ</label>
                        <input type="text" class="form-control" id="compHSN" placeholder="દા.ત. 9968">
                    </div>
                </div>
            </div>

            <h5 class="section-title"><i class="fas fa-university"></i>બેંક ખાતા વિગતો</h5>
            
            <div class="row g-3 mb-3">
                <div class="col-md-4">
                    <div class="form-group mb-0">
                        <label class="form-label"><i class="fas fa-building-columns"></i> બેંકનું નામ</label>
                        <input type="text" class="form-control" id="bankName" placeholder="દા.ત. SBI, BOB">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-group mb-0">
                        <label class="form-label"><i class="fas fa-hashtag"></i> ખાતા નંબર</label>
                        <input type="text" class="form-control" id="bankAccNo" placeholder="000000000000">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-group mb-0">
                        <label class="form-label"><i class="fas fa-code"></i> IFSC કોડ</label>
                        <input type="text" class="form-control" id="bankIFSC" placeholder="SBIN0001234">
                    </div>
                </div>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="fas fa-save"></i> માહિતી સેવ કરો
                </button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="company-master.js"></script>
<script>
    const mobileToggle = document.getElementById('mobileToggle');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    
    if (mobileToggle) {
        mobileToggle.addEventListener('click', function() {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        });
        overlay.addEventListener('click', function() {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        });
    }
</script>
</body>
</html>
